<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система учета складских остатков</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            /* Градиентный фон */
            background: linear-gradient( 180deg, #f5f7ff 0%, #b7d2ff 45%, #2d5bff 100% );
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #111;
            padding-top: 40px;
            margin-bottom: 40px;
            font-size: 42px;
        }

        .form-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        input {
            padding: 12px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

            button:hover {
                background-color: #1d4ed8;
            }

        table {
            width: 92%;
            margin: auto;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        th {
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 17px;
        }

        td {
            border: 1px solid rgba(255,255,255,0.4);
            padding: 14px;
            text-align: center;
            font-size: 16px;
        }

        tr:nth-child(even) {
            background-color: rgba(255,255,255,0.45);
        }

        .delete-btn {
            background-color: #dc2626;
            padding: 8px 14px;
            border-radius: 6px;
        }

            .delete-btn:hover {
                background-color: #b91c1c;
            }
    </style>
</head>

<body>

    <h1>Система учета складских остатков</h1>

    <div class="form-container">

        <input type="text" id="name" placeholder="Название товара">

        <input type="number" id="quantity" placeholder="Количество">

        <input type="number" id="price" placeholder="Цена">

        <button onclick="addProduct()">Добавить</button>

    </div>

    <table>

        <thead>
            <tr>
                <th>Название</th>
                <th>Количество</th>
                <th>Цена</th>
                <th>Действие</th>
            </tr>
        </thead>

        <tbody id="productTable">
        </tbody>

    </table>

    <script>

        let editId = null;

        async function loadProducts() {

            const response = await fetch('/api/Products');

            const products = await response.json();

            let table = document.getElementById("productTable");

            table.innerHTML = "";

            products.forEach(product => {

                let row = table.insertRow();

                row.insertCell(0).innerText = product.name;
                row.insertCell(1).innerText = product.quantity;
                row.insertCell(2).innerText = product.price;

                let actionCell = row.insertCell(3);

                actionCell.innerHTML = `
                            <button onclick="editProduct('${product.id}', '${product.name}', '${product.quantity}', '${product.price}')">
                                Изменить
                            </button>

                            <button class="delete-btn" onclick="deleteProduct('${product.id}')">
                                Удалить
                            </button>
                        `;
            });
        }

        async function addProduct() {

            let name = document.getElementById("name").value;
            let quantity = document.getElementById("quantity").value;
            let price = document.getElementById("price").value;

            if (name === "" || quantity === "" || price === "") {
                alert("Заполните все поля");
                return;
            }

            let product = {
                name: name,
                quantity: parseInt(quantity),
                price: parseFloat(price),
                category: "Техника"
            };

            if (editId === null) {

                await fetch('/api/Products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(product)
                });

            } else {

                await fetch(`/api/Products/${editId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(product)
                });

                editId = null;

                document.querySelector("button").innerText = "Добавить";
            }

            document.getElementById("name").value = "";
            document.getElementById("quantity").value = "";
            document.getElementById("price").value = "";

            loadProducts();
        }

        async function deleteProduct(id) {

            await fetch(`/api/Products/${id}`, {
                method: 'DELETE'
            });

            loadProducts();
        }

        function editProduct(id, name, quantity, price) {

            document.getElementById("name").value = name;
            document.getElementById("quantity").value = quantity;
            document.getElementById("price").value = price;

            editId = id;

            document.querySelector("button").innerText = "Сохранить";
        }

        loadProducts();

    </script>

</body>
</html>
